<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .main-poster {
            width: 90%;
            max-width: 900px;
            height: 600px;
            margin: 30px auto;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            background-image:
                linear-gradient(to bottom,
                    rgba(10, 25, 47, 0.7) 0%,
                    rgba(16, 37, 66, 0.5) 50%,
                    rgba(22, 49, 85, 0.3) 100%), url('https://i.pinimg.com/736x/53/2b/d4/532bd4a1e625316bc323d69aa770857f.jpg');

            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(100, 255, 218, 0.2);

            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        body {

            margin: 0;
            padding: 20px;
            font-family: 'Exo 2', sans-serif;
            background-color: #0a192f;
            color: #ccd6f6;
        }

        .main-title {
            font-family: 'Audiowide', cursive;
            font-size: 56px;
            color: #ffffff;
            margin-top: 80px;
            margin-bottom: 25px;
            text-shadow:
                0 0 10px rgba(100, 255, 218, 0.8),
                0 0 20px rgba(100, 255, 218, 0.4),
                0 0 30px rgba(100, 255, 218, 0.2);

            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="main-poster">
        <h1 class="main-title">
            Летающие острова <span class="world-name">ЭФИРИИ</span>
        </h1>
        <p class="subtitle">Мир парящих островов и загадочных кристалов</p>
        <div class="island-counter">
            <span class="counter-number">7</span>
            <span class="counter-text">Островов в небе</span>
        </div>
    </div>
</body>

</html>
